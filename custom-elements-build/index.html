<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wix Forms Build Preview</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: Inter, Arial, sans-serif;
        background: #f5f7fb;
        color: #0f172a;
      }

      .grid {
        display: grid;
        gap: 24px;
        max-width: 960px;
      }

      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 16px;
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 1rem;
      }
    </style>
    <script type="module">
      import "../dist/custom-elements/form-build/wix-forms.js";
    </script>
  </head>
  <body>
    <h1>Custom Elements Build Preview</h1>
    <p>Using compiled bundle: <code>dist/custom-elements/form-build/wix-forms.js</code></p>

    <div class="grid">
      <section class="card">
        <h2>&lt;contact-form&gt;</h2>
        <contact-form
          recaptcha-site-key="6LeJngIoAAAAAKmat_gUGMapx1og_-Kr_bE379yx"
          form-web-client-endpoint="/_mock/forms"
          language="en"
          is-dev="true"
        ></contact-form>
      </section>

      <section class="card">
        <h2>&lt;newsletter-form&gt;</h2>
        <newsletter-form
          recaptcha-site-key="6LeJngIoAAAAAKmat_gUGMapx1og_-Kr_bE379yx"
          form-web-client-endpoint="/_mock/forms"
          language="en"
          is-dev="true"
          prefills='{"email":"test@example.com","utm_source":"preview","utm_campaign":"build"}'
        ></newsletter-form>
      </section>
    </div>
  </body>
</html>
